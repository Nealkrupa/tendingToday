<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meal Planning</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="TendingToday" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#EEF1EA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --bg: #E7EEF3;
    --card: #FFFFFF;
    --ink: #263029;
    --muted: #6B7568;
    --line: #CFE0EA;
    --rose: #B4636F;
    --rose-bg: #F6E8EA;
    --gold: #C08A2E;
    --gold-bg: #FBF1DE;
    --sage: #7C9075;
    --sage-bg: #E4EBDF;
    --blue: #5B7B9A;
    --blue-bg: #DCE7EF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
  }

  #app {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 48px 0;
    -webkit-tap-highlight-color: transparent;
  }

  .header-icons {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .home-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 2px rgba(38,48,41,0.1);
    text-decoration: none;
    color: var(--ink);
    flex-shrink: 0;
    transition: transform 0.12s ease;
  }
  .home-btn:active { transform: scale(0.92); }

  .header {
    padding: 28px 20px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-text h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }

  .header-text .date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .pot-wrap {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .icon-progress {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .progress-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--blue);
    background: var(--blue-bg);
    padding: 3px 10px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    position: relative;
    overflow: hidden;
  }

  @keyframes countPop {
    0% { transform: scale(1); }
    45% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }

  .progress-count.count-pop {
    animation: countPop 0.45s ease;
  }

  .progress-count.shimmer-t1::after,
  .progress-count.shimmer-t2::after,
  .progress-count.shimmer-t3::after,
  .progress-count.shimmer-prestige::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60%;
    width: 45%;
    height: 100%;
    background: linear-gradient(120deg, transparent, var(--badge-shimmer, rgba(255,255,255,0.95)), transparent);
    animation: badgeShimmer 3.4s ease-in-out infinite;
    opacity: var(--badge-opacity, 0.05);
  }

  .progress-count.shimmer-t2::after {
    animation-duration: 2.8s;
  }

  .progress-count.shimmer-t2 {
    box-shadow: 0 0 5px 0 var(--blue-bg);
  }

  .progress-count.shimmer-t3::after {
    animation-duration: 2.2s;
  }

  .progress-count.shimmer-t3 {
    font-weight: 700;
    box-shadow: 0 0 8px 1px var(--blue-bg);
  }

  .progress-count.shimmer-prestige {
    font-weight: 700;
    color: var(--badge-edge, var(--blue));
    box-shadow: 0 0 10px 2px var(--badge-edge, var(--blue-bg));
  }

  .progress-count.shimmer-prestige::after {
    animation-duration: 1.7s;
  }

  @keyframes badgeShimmer {
    0% { left: -60%; }
    55% { left: 130%; }
    100% { left: 130%; }
  }

  .section {
    margin: 0 16px 16px 16px;
    background: var(--card);
    border-radius: 18px;
    padding: 18px 18px 14px;
    box-shadow: 0 1px 2px rgba(38,48,41,0.06);
  }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 6px 0;
  }

  .section h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 12px 0;
  }

  .section-sub {
    font-size: 12px;
    color: var(--muted);
    margin: -8px 0 12px 0;
  }

  /* Add row (shared) */
  .add-row {
    display: flex;
    gap: 8px;
  }
  .add-input {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    padding: 11px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    color: var(--ink);
    outline: none;
    min-width: 0;
  }
  .add-input:focus { border-color: var(--blue); }
  .add-btn {
    width: 44px;
    flex-shrink: 0;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: white;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.12s ease;
  }
  .add-btn:active { transform: scale(0.92); }

  .add-btn-wide {
    width: 100%;
    margin-top: 8px;
    border-radius: 12px;
    border: none;
    background: var(--blue);
    color: white;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 600;
    padding: 11px 14px;
    cursor: pointer;
    transition: transform 0.12s ease;
  }
  .add-btn-wide:active { transform: scale(0.98); }

  /* List rows (shared) */
  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 2px;
    border-bottom: 1px solid var(--line);
    user-select: none;
  }
  .task-row:last-child { border-bottom: none; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    background: transparent;
    cursor: pointer;
  }
  .checkbox svg { opacity: 0; transform: scale(0.5); transition: all 0.18s ease; }
  .checkbox.checked { background: var(--blue); border-color: var(--blue); }
  .checkbox.checked svg { opacity: 1; transform: scale(1); }

  .task-label {
    flex: 1;
    font-size: 15px;
    line-height: 1.35;
    transition: color 0.18s ease, opacity 0.18s ease;
    cursor: pointer;
    word-break: break-word;
  }
  .task-row.done .task-label { color: var(--muted); opacity: 0.65; text-decoration: line-through; text-decoration-color: var(--muted); }

  .remove-btn {
    flex-shrink: 0;
    width: 26px;
    height: 26px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.55;
    transition: opacity 0.15s ease, background 0.15s ease;
  }
  .remove-btn:hover { opacity: 1; background: var(--rose-bg); color: var(--rose); }

  .empty-state {
    padding: 22px 2px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
  }

  .footer-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 4px 2px 0;
    padding-top: 4px;
  }
  .search-input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 12px;
    border: 1.5px solid var(--line);
    background: var(--bg);
    color: var(--ink);
    outline: none;
    margin: 10px 0 4px;
  }
  .search-input:focus { border-color: var(--blue); }

  .count-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .clear-btn {
    font-family: inherit;
    font-size: 12px;
    color: var(--rose);
    background: none;
    border: none;
    text-decoration: underline;
    cursor: pointer;
    padding: 4px 0;
  }
  .clear-btn:disabled {
    color: var(--muted);
    text-decoration: none;
    cursor: default;
    opacity: 0.6;
  }

  /* Recipe book rows */
  .recipe-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 10px 2px;
    border-bottom: 1px solid var(--line);
  }
  .recipe-row:last-child { border-bottom: none; }
  .recipe-row .checkbox { margin-top: 2px; }

  .recipe-main { flex: 1; min-width: 0; }

  .added-by {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10.5px;
    color: var(--muted);
    opacity: 0.7;
    margin-top: 4px;
  }

  .recipe-title-input {
    width: 100%;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 15.5px;
    border: none;
    background: transparent;
    color: var(--ink);
    outline: none;
    padding: 2px 0;
  }

  .recipe-link-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 2px;
  }
  .recipe-link-input {
    flex: 1;
    font-size: 13px;
    color: var(--muted);
    border: none;
    border-bottom: 1px dashed var(--line);
    background: transparent;
    outline: none;
    padding: 3px 0;
    min-width: 0;
  }
  .recipe-link-input:focus { border-bottom-color: var(--blue); }
  .recipe-link-input::placeholder { color: var(--muted); opacity: 0.7; }

  .icon-btn {
    flex-shrink: 0;
    width: 24px;
    height: 24px;
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue);
    background: var(--blue-bg);
    text-decoration: none;
  }

  .recipe-details-input {
    width: 100%;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    line-height: 1.45;
    color: var(--ink);
    border: none;
    background: transparent;
    outline: none;
    padding: 6px 0 2px 0;
    margin-top: 2px;
    border-top: 1px dashed var(--line);
    resize: none;
    overflow: hidden;
    display: block;
  }
  .recipe-details-input::placeholder { color: var(--muted); opacity: 0.75; }

  /* Ingredient rows: same shared .task-row, but taller now that each one can
     carry a category tag + an optional comment, so the row's own items align
     to the top rather than centering against that extra height. */
  .ingredient-row { align-items: flex-start; }
  .ingredient-main { flex: 1; min-width: 0; }
  .ingredient-top-row {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Category tag — same small uppercase pill treatment as Contacts'
     .contact-tag-input, recolored to this page's blue accent. */
  .ingredient-tag-input {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--blue);
    background: var(--blue-bg);
    border: none;
    padding: 3px 8px;
    border-radius: 999px;
    outline: none;
    width: 110px;
    min-width: 0;
  }
  .ingredient-tag-input::placeholder { color: var(--blue); opacity: 0.55; }

  /* Meals-for-the-week rows */
  .meal-plan-row .task-label a {
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid currentColor;
    opacity: 0.85;
  }
  .meal-plan-row .task-label a svg { margin-left: 4px; vertical-align: -1px; opacity: 0.6; }

  .grace {
    margin: 24px 20px 0;
    padding: 16px 18px;
    text-align: center;
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted);
    font-style: italic;
  }

  html[data-theme="dark"] {
    --bg: #1B1E1A;
    --card: #242821;
    --ink: #E9ECE4;
    --muted: #93A18F;
    --line: #33372E;
    --rose: #E08A96;
    --rose-bg: #3A2429;
    --gold: #E0A94A;
    --gold-bg: #3A2E17;
    --sage: #9DBB92;
    --sage-bg: #29332A;
    --blue: #82A4C4;
    --blue-bg: #223541;
  }

  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body style="margin:0;">
<script src="theme.js?v=1"></script>
<script src="priority-alert.js?v=4"></script>
<script src="mascot.js?v=25"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="auth.js?v=1"></script>
<script src="visits.js?v=1"></script>
<script src="achievements.js?v=5"></script>
<div id="app"></div>

<script>
(function() {
  function weekKey(d) {
    // Weeks run Wednesday through Tuesday. Find the most recent Wednesday
    // on or before `d` and use that date as the key, so it changes exactly
    // once a week, on Wednesdays — not on whatever day the week happened
    // to start by default.
    const day = d.getDay(); // 0 = Sun, 1 = Mon, ..., 3 = Wed, ..., 6 = Sat
    const daysSinceWednesday = (day - 3 + 7) % 7;
    const anchor = new Date(d.getFullYear(), d.getMonth(), d.getDate() - daysSinceWednesday);
    return anchor.getFullYear() + '-' + String(anchor.getMonth() + 1).padStart(2, '0') + '-' + String(anchor.getDate()).padStart(2, '0');
  }

  const now = new Date();
  const wk = weekKey(now);

  const defaultState = {
    weekKey: wk,
    ingredients: [],   // { id, text, category, comment }
    recipes: []        // { id, title, url, selected }
  };

  let state = null;
  let recipeSearchTerm = '';
  let achievementCounts = {};
  let prevLifetimeCount = null;
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Getting things ready\u2026</div>';

  // --- Firebase setup (same project as Tending Today, separate document) ---
  const firebaseConfig = {
    apiKey: "AIzaSyAzJ9EFIGW1l5-IgmrD2MyGTe8_WIcL3hs",
    authDomain: "tendingtoday-f30e4.firebaseapp.com",
    projectId: "tendingtoday-f30e4",
    storageBucket: "tendingtoday-f30e4.firebasestorage.app",
    messagingSenderId: "334824670755",
    appId: "1:334824670755:web:c21c47bc292f8ed711d396",
    measurementId: "G-LJ7XZP3FE1"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const docRef = db.collection('household').doc('meal-planning-state');

  function normalizeAndReset(raw) {
    let s = raw ? JSON.parse(JSON.stringify(raw)) : structuredClone(defaultState);
    let changed = false;
    if (!Array.isArray(s.ingredients)) { s.ingredients = []; changed = true; }
    s.ingredients.forEach(it => {
      if (typeof it.category !== 'string') { it.category = ''; changed = true; }
      if (typeof it.comment !== 'string') { it.comment = ''; changed = true; }
    });
    if (!Array.isArray(s.recipes)) {
      // Migrate any older mealIdeas / recipeLinks data into the unified recipe book.
      const migrated = [];
      if (Array.isArray(s.recipeLinks)) {
        s.recipeLinks.forEach(r => migrated.push({ id: r.id || makeId('r'), title: r.title || '', url: r.url || '', selected: false }));
      }
      if (Array.isArray(s.mealIdeas)) {
        s.mealIdeas.forEach(m => migrated.push({ id: m.id || makeId('r'), title: m.text || '', url: '', selected: !!m.done }));
      }
      s.recipes = migrated;
      delete s.mealIdeas;
      delete s.recipeLinks;
      changed = true;
    }
    s.recipes.forEach(r => {
      if (typeof r.selected !== 'boolean') { r.selected = false; changed = true; }
      if (typeof r.url !== 'string') { r.url = ''; changed = true; }
      if (typeof r.details !== 'string') { r.details = ''; changed = true; }
      if (typeof r.addedBy !== 'string') { r.addedBy = ''; changed = true; }
    });
    if (s.weekKey !== wk) {
      // New week: ingredients-on-hand clears, and the weekly meal selection resets.
      // The recipe book itself (titles, links) is never touched here.
      s.weekKey = wk;
      s.ingredients = [];
      s.recipes.forEach(r => { r.selected = false; });
      changed = true;
    }
    return { s, changed };
  }

  function makeId(prefix) {
    return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  async function load() {
    try {
      const snap = await docRef.get();
      const { s, changed } = normalizeAndReset(snap.exists ? snap.data() : null);
      state = s;
      if (changed || !snap.exists) {
        await save();
      }
      render();

      docRef.onSnapshot((snapshot) => {
        if (!snapshot.exists) return;
        const { s: incoming, changed: needsWrite } = normalizeAndReset(snapshot.data());
        state = incoming;
        render();
        if (needsWrite) save();
      });
    } catch (e) {
      console.error('Firestore load failed', e);
      state = structuredClone(defaultState);
      app.innerHTML = '<div class="loading">Couldn\u2019t connect \u2014 check your connection and reload.</div>';
    }
  }

  async function save() {
    try {
      await docRef.set(state);
      if (window.trackPageUpdate) window.trackPageUpdate('meal-planning');
    } catch (e) {
      console.error('Firestore save failed', e);
    }
  }

  function potSVG(fraction) {
    // Veggies pile into the pot as the ingredients-on-hand list grows.
    const bits = [
      { cx: 20, cy: 42, r: 4.2, fill: '#C08A2E', op: Math.min(1, fraction / 0.15) },
      { cx: 36, cy: 42, r: 4.2, fill: '#7C9075', op: Math.min(1, Math.max(0,(fraction-0.12)) / 0.15) },
      { cx: 28, cy: 43.5, r: 4.6, fill: '#B4636F', op: Math.min(1, Math.max(0,(fraction-0.28)) / 0.15) },
      { cx: 22, cy: 37, r: 4, fill: '#7C9075', op: Math.min(1, Math.max(0,(fraction-0.45)) / 0.15) },
      { cx: 34, cy: 37, r: 4, fill: '#C08A2E', op: Math.min(1, Math.max(0,(fraction-0.6)) / 0.15) },
      { cx: 28, cy: 32, r: 4.2, fill: '#7C9075', op: Math.min(1, Math.max(0,(fraction-0.78)) / 0.2) }
    ];
    const bitShapes = bits.map(b =>
      `<circle cx="${b.cx}" cy="${b.cy}" r="${b.r}" fill="${b.fill}" style="opacity:${b.op}; transition: opacity 0.4s ease;"/>`
    ).join('');
    return `<svg viewBox="0 0 56 56" width="56" height="56">
      <g clip-path="url(#pot-clip)">
        ${bitShapes}
      </g>
      <defs>
        <clipPath id="pot-clip">
          <path d="M14 24 L42 24 L38 42 Q28 46 18 42 Z"/>
        </clipPath>
      </defs>
      <path d="M13 34 L43 34 L38 44 Q28 48.5 18 44 Z" fill="none" stroke="#5B7B9A" stroke-width="3.2" stroke-linejoin="round"/>
      <path d="M13 34 L43 34" stroke="#5B7B9A" stroke-width="3.2" stroke-linecap="round"/>
      <path d="M11 32 L15 32" stroke="#5B7B9A" stroke-width="3" stroke-linecap="round"/>
      <path d="M41 32 L45 32" stroke="#5B7B9A" stroke-width="3" stroke-linecap="round"/>
    </svg>`;
  }

  function checkIcon() {
    return `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7L5.5 10.5L12 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
  }

  function homeIcon() {
    return `<svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 7.5L8 2.5L14 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M4 6.5V13H12V6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
  }

  function themeIcon() {
    return window.currentTheme === 'dark'
      ? `<svg width="15" height="15" viewBox="0 0 16 16"><circle cx="8" cy="8" r="3.2" fill="currentColor"/><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M8 1.5V3.2"/><path d="M8 12.8V14.5"/><path d="M1.5 8H3.2"/><path d="M12.8 8H14.5"/><path d="M3.4 3.4L4.6 4.6"/><path d="M11.4 11.4L12.6 12.6"/><path d="M12.6 3.4L11.4 4.6"/><path d="M4.6 11.4L3.4 12.6"/></g></svg>`
      : `<svg width="15" height="15" viewBox="0 0 16 16"><path d="M13.5 9.5A6 6 0 1 1 6.5 2.5A5 5 0 0 0 13.5 9.5Z" fill="currentColor"/></svg>`;
  }

  function linkIcon() {
    return `<svg width="13" height="13" viewBox="0 0 13 13"><path d="M5 8L8 5M6 3.5L6.8 2.7C7.8 1.7 9.4 1.7 10.3 2.7C11.3 3.6 11.3 5.2 10.3 6.2L9.5 7M7 9.5L6.2 10.3C5.2 11.3 3.6 11.3 2.7 10.3C1.7 9.4 1.7 7.8 2.7 6.8L3.5 6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" fill="none"/></svg>`;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function escapeAttr(str) {
    return escapeHtml(str).replace(/"/g, '&quot;');
  }

  function normalizeUrl(u) {
    u = u.trim();
    if (!u) return '';
    if (!/^https?:\/\//i.test(u)) u = 'https://' + u;
    return u;
  }

  function hostnameOf(u) {
    try { return new URL(u).hostname.replace(/^www\./, ''); }
    catch (e) { return u; }
  }

  function render() {
    const dateLabel = now.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    const ingFrac = Math.min(1, state.ingredients.length / 10);
    const selectedRecipes = state.recipes.filter(r => r.selected);
    const lifetimeCount = window.sumAchievementCounts
      ? window.sumAchievementCounts(achievementCounts, ['meal:recipe'])
      : 0;
    const didIncrease = prevLifetimeCount !== null && lifetimeCount > prevLifetimeCount;
    prevLifetimeCount = lifetimeCount;
    const badgeTier = window.badgeTierForCount ? window.badgeTierForCount(lifetimeCount) : 0;
    const tierClass = badgeTier >= 4 ? 'shimmer-prestige' : badgeTier === 3 ? 'shimmer-t3' : badgeTier === 2 ? 'shimmer-t2' : badgeTier === 1 ? 'shimmer-t1' : '';
    const badgePalette = badgeTier >= 4 && window.badgePaletteForTier ? window.badgePaletteForTier(badgeTier) : null;
    const badgeOpacity = window.badgeShimmerOpacity ? window.badgeShimmerOpacity(badgeTier) : 0;
    const badgeStyleParts = [];
    if (badgeTier >= 1) badgeStyleParts.push(`--badge-opacity:${badgeOpacity}`);
    if (badgePalette) badgeStyleParts.push(`--badge-edge:${badgePalette.edge}`, `--badge-shimmer:${badgePalette.shimmer}`);
    const badgeStyle = badgeStyleParts.length ? ` style="${badgeStyleParts.join('; ')};"` : '';
    const countClasses = ['progress-count', tierClass, didIncrease ? 'count-pop' : ''].filter(Boolean).join(' ');

    let html = '';
    html += `<div class="header">
      <div class="header-icons">
        <a class="home-btn" href="home.html" aria-label="Home">${homeIcon()}</a>
      </div>
      <div class="header-text">
        <h1>Meal Planning</h1>
        <div class="date">${dateLabel}</div>
      </div>
      <div class="icon-progress">
        <div class="pot-wrap">${potSVG(ingFrac)}</div>
        <div class="${countClasses}"${badgeStyle} aria-label="Lifetime recipes added">${lifetimeCount}</div>
      </div>
    </div>`;

    // Meals for the week (derived from checked recipes below)
    html += `<div class="section">
      <div class="eyebrow">This Week's Plan</div>
      <h2>Meals for the week</h2>`;

    if (selectedRecipes.length === 0) {
      html += `<div class="empty-state">Nothing planned yet \u2014 check off recipes in the book below to add them here.</div>`;
    } else {
      selectedRecipes.forEach(r => {
        const label = r.url
          ? `<a href="${r.url}" target="_blank" rel="noopener noreferrer">${escapeHtml(r.title)}${linkIcon()}</a>`
          : escapeHtml(r.title);
        html += `<div class="task-row meal-plan-row" data-id="${r.id}">
          <div class="checkbox checked" data-select="${r.id}">${checkIcon()}</div>
          <div class="task-label" data-select="${r.id}">${label}</div>
        </div>`;
      });
    }
    html += `</div>`;

    // Ingredients on hand
    html += `<div class="section">
      <div class="eyebrow">On Hand This Week</div>
      <h2>What's in the kitchen</h2>
      <div class="section-sub">Clears automatically at the start of each new week</div>
      <div class="add-row">
        <input type="text" class="add-input" id="new-ingredient-input" placeholder="e.g. chicken thighs" autocomplete="off">
        <button class="add-btn" id="add-ingredient-btn" aria-label="Add ingredient">+</button>
      </div>`;

    if (state.ingredients.length === 0) {
      html += `<div class="empty-state">Nothing listed yet \u2014 add what's in the fridge and pantry.</div>`;
    } else {
      state.ingredients.forEach(it => {
        html += `<div class="task-row ingredient-row" data-id="${it.id}">
          <div class="ingredient-main">
            <div class="ingredient-top-row">
              <div class="task-label" style="cursor:default;">${escapeHtml(it.text)}</div>
              <input type="text" class="ingredient-tag-input" value="${escapeAttr(it.category)}" placeholder="Category" data-edit-ing-category="${it.id}">
            </div>
            <textarea class="recipe-details-input" rows="1" placeholder="Add a note (optional)" data-edit-ing-comment="${it.id}">${escapeHtml(it.comment)}</textarea>
          </div>
          <button class="remove-btn" data-remove-ing="${it.id}" aria-label="Remove ingredient">\u00d7</button>
        </div>`;
      });
    }
    html += `</div>`;

    // Recipe book
    html += `<div class="section">
      <div class="eyebrow">Saved &amp; Ready To Cook</div>
      <h2>Recipe book</h2>
      <input type="text" class="add-input" id="new-recipe-title" placeholder="Recipe name" autocomplete="off" style="margin-bottom:8px; width:100%;">
      <input type="text" class="add-input" id="new-recipe-url" placeholder="Link (optional)" autocomplete="off" style="width:100%;">
      <button class="add-btn-wide" id="add-recipe-btn">Add to recipe book</button>`;

    if (state.recipes.length === 0) {
      html += `<div class="empty-state">No recipes saved yet \u2014 add the first one you want to keep on hand.</div>`;
    } else {
      const term = recipeSearchTerm.trim().toLowerCase();
      const filteredRecipes = term
        ? state.recipes.filter(r =>
            r.title.toLowerCase().includes(term) ||
            (r.details || '').toLowerCase().includes(term) ||
            (r.url || '').toLowerCase().includes(term))
        : state.recipes;

      html += `<input type="text" class="search-input" id="recipe-search-input" placeholder="Search recipes by name or ingredients" value="${escapeAttr(recipeSearchTerm)}">`;

      if (filteredRecipes.length === 0) {
        html += `<div class="empty-state">No recipes match "${escapeHtml(recipeSearchTerm)}".</div>`;
      } else {
        filteredRecipes.forEach(r => {
          html += `<div class="recipe-row" data-id="${r.id}">
            <div class="checkbox ${r.selected ? 'checked' : ''}" data-select="${r.id}" aria-label="Plan for this week">${checkIcon()}</div>
            <div class="recipe-main">
              <input type="text" class="recipe-title-input" value="${escapeAttr(r.title)}" placeholder="Recipe name" data-edit="${r.id}|title">
              <div class="recipe-link-row">
                <input type="text" class="recipe-link-input" value="${escapeAttr(r.url)}" placeholder="Link (optional)" data-edit="${r.id}|url">
                ${r.url ? `<a class="icon-btn" href="${r.url}" target="_blank" rel="noopener noreferrer" aria-label="Open link">${linkIcon()}</a>` : ''}
              </div>
              <textarea class="recipe-details-input" rows="1" placeholder="Add ingredients or recipe notes (optional)" data-edit-details="${r.id}">${escapeHtml(r.details)}</textarea>
              ${r.addedBy ? `<div class="added-by">Added by ${escapeHtml(r.addedBy)}</div>` : ''}
            </div>
            <button class="remove-btn" data-remove-recipe="${r.id}" aria-label="Delete recipe">\u00d7</button>
          </div>`;
        });
      }
      html += `<div class="count-label" style="margin-top:8px;">${filteredRecipes.length} of ${state.recipes.length} recipe${state.recipes.length === 1 ? '' : 's'} \u00b7 ${selectedRecipes.length} planned this week</div>`;
    }
    html += `</div>`;

    html += `<div class="grace">Check a recipe to add it to this week's plan \u2014 uncheck anytime to remove it. Recipes stay in the book permanently until you delete them, and the weekly plan clears itself at the start of each new week.<br><br>Ingredients reset each week so the list stays honest.</div>`;
    html += `<div style="height:56px;"></div>`;

    app.innerHTML = html;
    bindEvents();
  }

  function bindEvents() {

    const recipeSearchInput = app.querySelector('#recipe-search-input');
    if (recipeSearchInput) {
      recipeSearchInput.addEventListener('input', () => {
        recipeSearchTerm = recipeSearchInput.value;
        render();
        const fresh = app.querySelector('#recipe-search-input');
        if (fresh) {
          fresh.focus();
          fresh.setSelectionRange(fresh.value.length, fresh.value.length);
        }
      });
    }

    // Ingredients
    const ingInput = app.querySelector('#new-ingredient-input');
    const ingBtn = app.querySelector('#add-ingredient-btn');
    async function addIngredient() {
      const text = ingInput.value.trim();
      if (!text) return;
      state.ingredients.push({ id: makeId('g'), text, category: '', comment: '' });
      ingInput.value = '';
      await save();
      render();
      const fresh = app.querySelector('#new-ingredient-input');
      if (fresh) fresh.focus();
    }
    if (ingBtn) ingBtn.addEventListener('click', addIngredient);
    if (ingInput) ingInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') addIngredient(); });

    app.querySelectorAll('[data-remove-ing]').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.getAttribute('data-remove-ing');
        state.ingredients = state.ingredients.filter(i => i.id !== id);
        await save();
        render();
      });
    });

    app.querySelectorAll('[data-edit-ing-category]').forEach(el => {
      el.addEventListener('change', async () => {
        const id = el.getAttribute('data-edit-ing-category');
        const it = state.ingredients.find(i => i.id === id);
        if (it) {
          it.category = el.value.trim();
          await save();
        }
        render();
      });
    });

    app.querySelectorAll('[data-edit-ing-comment]').forEach(el => {
      el.addEventListener('change', async () => {
        const id = el.getAttribute('data-edit-ing-comment');
        const it = state.ingredients.find(i => i.id === id);
        if (it) {
          it.comment = el.value.trim();
          await save();
        }
        render();
      });
    });

    // Recipe book
    const titleInput = app.querySelector('#new-recipe-title');
    const urlInput = app.querySelector('#new-recipe-url');
    const recipeBtn = app.querySelector('#add-recipe-btn');
    async function addRecipe() {
      const title = titleInput.value.trim();
      if (!title) return;
      const url = normalizeUrl(urlInput.value);
      state.recipes.push({
        id: makeId('r'),
        title,
        url,
        selected: false,
        details: '',
        addedBy: (window.getHouseholdUserLabel && window.getHouseholdUserLabel()) || ''
      });
      titleInput.value = '';
      urlInput.value = '';
      if (window.recordAchievement) recordAchievement('meal:recipe', 1);
      await save();
      render();
    }
    if (recipeBtn) recipeBtn.addEventListener('click', addRecipe);
    [titleInput, urlInput].forEach(inp => {
      if (inp) inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); addRecipe(); } });
    });

    // Toggle "planned this week" — works from both the top plan section and the recipe book
    app.querySelectorAll('[data-select]').forEach(el => {
      el.addEventListener('click', async (e) => {
        if (e.target.closest('a')) return; // let the recipe link open normally
        const id = el.getAttribute('data-select');
        const r = state.recipes.find(x => x.id === id);
        if (r) r.selected = !r.selected;
        await save();
        render();
      });
    });

    // Inline editing of recipe title/link
    app.querySelectorAll('[data-edit]').forEach(el => {
      el.addEventListener('change', async () => {
        const [id, field] = el.getAttribute('data-edit').split('|');
        const r = state.recipes.find(x => x.id === id);
        if (!r) return;
        if (field === 'title') {
          const val = el.value.trim();
          if (val) { r.title = val; await save(); }
        } else if (field === 'url') {
          r.url = normalizeUrl(el.value);
          await save();
        }
        render();
      });
    });

    app.querySelectorAll('[data-remove-recipe]').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.getAttribute('data-remove-recipe');
        state.recipes = state.recipes.filter(r => r.id !== id);
        if (window.recordAchievement) recordAchievement('meal:recipe', -1);
        await save();
        render();
      });
    });

    app.querySelectorAll('[data-edit-details]').forEach(el => {
      el.addEventListener('change', async () => {
        const id = el.getAttribute('data-edit-details');
        const r = state.recipes.find(x => x.id === id);
        if (r) {
          r.details = el.value.trim();
          await save();
        }
        render();
      });
    });

    app.querySelectorAll('textarea.recipe-details-input').forEach(el => {
      const autoGrow = () => { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; };
      autoGrow();
      el.addEventListener('input', autoGrow);
    });
  }

  requireHouseholdAuth(function() {
    trackPageVisit('meal-planning');
    initTheme();
    initPriorityAlertBanner();
    initMascotWidget();
    if (window.subscribeAchievementCounts) {
      window.subscribeAchievementCounts(function (counts) {
        achievementCounts = counts;
        if (state) render();
      });
    }
    load();
  });
})();
</script>

</body>
</html>
