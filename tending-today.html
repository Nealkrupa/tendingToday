<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tending Today</title>
<link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="shortcut icon" href="/favicon.ico" />
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
<meta name="apple-mobile-web-app-title" content="TendingToday" />
<link rel="manifest" href="/site.webmanifest" />
<meta name="theme-color" content="#EEF1EA" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap');

  :root{
    --bg: #EEF1EA;
    --card: #FFFFFF;
    --ink: #263029;
    --muted: #6B7568;
    --line: #DDE3D6;
    --rose: #B4636F;
    --rose-bg: #F6E8EA;
    --gold: #C08A2E;
    --gold-bg: #FBF1DE;
    --sage: #7C9075;
    --sage-bg: #E4EBDF;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: var(--bg);
  }

  #app {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    max-width: 480px;
    margin: 0 auto;
    padding: 0 0 48px 0;
    -webkit-tap-highlight-color: transparent;
  }

  .header-icons {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .home-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: var(--card);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 1px 2px rgba(38,48,41,0.1);
    text-decoration: none;
    color: var(--ink);
    flex-shrink: 0;
    transition: transform 0.12s ease;
  }
  .home-btn:active { transform: scale(0.92); }

  .header {
    padding: 28px 20px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .header-text h1 {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 24px;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }

  .header-text .date {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .plant-wrap {
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .icon-progress {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .progress-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--sage);
    background: var(--sage-bg);
    padding: 3px 10px;
    border-radius: 999px;
    font-variant-numeric: tabular-nums;
    position: relative;
    overflow: hidden;
  }

  @keyframes countPop {
    0% { transform: scale(1); }
    45% { transform: scale(1.28); }
    100% { transform: scale(1); }
  }

  .progress-count.count-pop {
    animation: countPop 0.45s ease;
  }

  .progress-count.shimmer-t1::after,
  .progress-count.shimmer-t2::after,
  .progress-count.shimmer-t3::after,
  .progress-count.shimmer-prestige::after {
    content: '';
    position: absolute;
    top: 0;
    left: -60%;
    width: 45%;
    height: 100%;
    background: linear-gradient(120deg, transparent, var(--badge-shimmer, rgba(255,255,255,0.95)), transparent);
    animation: badgeShimmer 3.4s ease-in-out infinite;
    opacity: var(--badge-opacity, 0.05);
  }

  .progress-count.shimmer-t2::after {
    animation-duration: 2.8s;
  }

  .progress-count.shimmer-t2 {
    box-shadow: 0 0 5px 0 var(--sage-bg);
  }

  .progress-count.shimmer-t3::after {
    animation-duration: 2.2s;
  }

  .progress-count.shimmer-t3 {
    font-weight: 700;
    box-shadow: 0 0 8px 1px var(--sage-bg);
  }

  .progress-count.shimmer-prestige {
    font-weight: 700;
    color: var(--badge-edge, var(--sage));
    box-shadow: 0 0 10px 2px var(--badge-edge, var(--sage-bg));
  }

  .progress-count.shimmer-prestige::after {
    animation-duration: 1.7s;
  }

  @keyframes badgeShimmer {
    0% { left: -60%; }
    55% { left: 130%; }
    100% { left: 130%; }
  }

  .section {
    margin: 0 16px 16px 16px;
    background: var(--card);
    border-radius: 18px;
    padding: 18px 18px 14px;
    box-shadow: 0 1px 2px rgba(38,48,41,0.06);
  }

  .section.zone { background: var(--gold-bg); }
  .section.rotisserie { background: var(--rose-bg); }
  .section.pet { background: var(--sage-bg); }

  .eyebrow {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin: 0 0 6px 0;
  }

  .section.zone .eyebrow { color: #8A6417; }
  .section.rotisserie .eyebrow { color: #92464F; }
  .section.pet .eyebrow { color: #52603F; }

  .section h2 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 18px;
    margin: 0 0 12px 0;
  }

  .task-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 2px;
    cursor: pointer;
    border-bottom: 1px solid var(--line);
    user-select: none;
  }
  .task-row:last-child { border-bottom: none; }

  .checkbox {
    width: 22px;
    height: 22px;
    border-radius: 7px;
    border: 2px solid var(--muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.18s ease;
    background: transparent;
  }
  .checkbox svg { opacity: 0; transform: scale(0.5); transition: all 0.18s ease; }
  .checkbox.checked { background: var(--sage); border-color: var(--sage); }
  .checkbox.checked svg { opacity: 1; transform: scale(1); }

  .task-label {
    font-size: 15px;
    line-height: 1.35;
    transition: color 0.18s ease, opacity 0.18s ease;
  }
  .task-row.done .task-label { color: var(--muted); opacity: 0.65; text-decoration: line-through; text-decoration-color: var(--muted); }

  .single-task {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    cursor: pointer;
    user-select: none;
  }
  .single-task .task-label { font-size: 15px; padding-top: 1px; }

  .sub-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .pet-row {
    display: flex;
    gap: 8px;
    margin-top: 4px;
  }
  .pet-dot {
    flex: 1;
    height: 34px;
    border-radius: 9px;
    border: 2px solid var(--sage);
    background: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--sage);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .pet-dot.done { background: var(--sage); color: white; }

  .grace {
    margin: 24px 20px 0;
    padding: 16px 18px;
    text-align: center;
    font-size: 13px;
    line-height: 1.5;
    color: var(--muted);
    font-style: italic;
  }

  .reset-link {
    display: block;
    text-align: center;
    margin: 16px auto 0;
    font-size: 12px;
    color: var(--muted);
    text-decoration: underline;
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
  }

  html[data-theme="dark"] {
    --bg: #1B1E1A;
    --card: #242821;
    --ink: #E9ECE4;
    --muted: #93A18F;
    --line: #33372E;
    --rose: #E08A96;
    --rose-bg: #3A2429;
    --gold: #E0A94A;
    --gold-bg: #3A2E17;
    --sage: #9DBB92;
    --sage-bg: #29332A;
  }

  .loading {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-size: 14px;
  }
</style>
</head>
<body style="margin:0;">
<script src="theme.js?v=1"></script>
<script src="priority-alert.js?v=4"></script>
<script src="mascot.js?v=2"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="auth.js?v=1"></script>
<script src="visits.js?v=1"></script>
<script src="achievements.js?v=5"></script>
<div id="app"></div>

<script>
(function() {
  const ZONES = [
    { day: 0, name: 'Living Spaces + Dust', room: 'Sunday', task: 'Dust visible surfaces in all 3 living areas' },
    { day: 1, name: 'Bathroom', room: 'Monday', task: 'Wipe toilet, sink, mirror; toss expired counter clutter' },
    { day: 2, name: 'Kitchen', room: 'Tuesday', task: 'Wipe appliance fronts, clear one fridge shelf, take out recycling' },
    { day: 3, name: 'Bedroom', room: 'Wednesday', task: 'Clear surfaces, rotate/wash bedding if due' },
    { day: 4, name: 'Cat Room', room: 'Thursday', task: 'Wipe litter box exteriors, sweep scatter, refresh water' },
    { day: 5, name: 'Office', room: 'Friday', task: 'Clear desk surface, file loose papers, wipe down' },
    { day: 6, name: 'Mop + Pet Fur Pass', room: 'Saturday', task: 'Mop kitchen/bathroom floors; lint-roll furniture & pet beds' }
  ];

  const ROTISSERIE = [
    'Wipe baseboards in one room',
    'Clean inside microwave',
    'Wipe switches, handles, cabinet pulls',
    'Vacuum/wipe under couch cushions',
    'Spot-check shower door/tile grout',
    'Wipe window sills in one room',
    'Clean out one junk drawer',
    'Wash cat room walls/litter mat',
    'Wipe ceiling fan blades',
    'Empty & wipe fridge produce drawers',
    'Dust blinds/curtain rods',
    'Wipe inside trash cans'
  ];

  // Rooms cycle in this fixed order whenever a task says "in one room", so
  // rooms rotate evenly rather than being doubled up or skipped.
  const ROOM_ROTATION = ['Living Room', 'Bathroom', 'Kitchen', 'Bedroom', 'Cat Room', 'Office'];

  function taskNeedsRoom(text) {
    return /in one room/i.test(text);
  }

  function makeActiveEntry(taskIndex, roomPointerRef) {
    const needsRoom = taskNeedsRoom(ROTISSERIE[taskIndex]);
    let room = null;
    if (needsRoom) {
      room = ROOM_ROTATION[roomPointerRef.value % ROOM_ROTATION.length];
      roomPointerRef.value += 1;
    }
    return { taskIndex, done: false, room };
  }

  // Builds a brand-new 3-task week from the top of the rotation. Used on
  // first-ever load and to migrate away from the old single-task format.
  function buildFreshRotisserie() {
    const allIndices = ROTISSERIE.map((_, i) => i);
    const roomPtr = { value: 0 };
    const active = allIndices.slice(0, 3).map(i => makeActiveEntry(i, roomPtr));
    const queue = allIndices.slice(3);
    return { queue, active, roomPointer: roomPtr.value };
  }

  // Called when a new week starts. Unfinished tasks carry over unchanged
  // (same task, same assigned room); completed ones are consumed and
  // replaced by pulling the next task(s) off the queue, restarting a fresh
  // lap through all 12 whenever the queue runs dry.
  function advanceRotisserieWeek(rot) {
    const carried = rot.active.filter(a => !a.done);
    let queue = rot.queue.slice();
    let roomPointer = rot.roomPointer;
    const activeIndices = new Set(carried.map(a => a.taskIndex));
    const newActive = carried.slice();
    while (newActive.length < 3) {
      if (queue.length === 0) {
        queue = ROTISSERIE.map((_, i) => i).filter(i => !activeIndices.has(i));
      }
      const nextIndex = queue.shift();
      activeIndices.add(nextIndex);
      const roomPtr = { value: roomPointer };
      const entry = makeActiveEntry(nextIndex, roomPtr);
      roomPointer = roomPtr.value;
      newActive.push(entry);
    }
    return { queue, active: newActive, roomPointer };
  }

  const DAILY_TASKS = [
    { id: 'bed', label: 'Make the bed' },
    { id: 'countersAM', label: 'Quick swipe: counters + sink clear' },
    { id: 'litter', label: 'Scoop litter boxes' },
    { id: 'dishes', label: 'Dishes done or dishwasher loaded' },
    { id: 'countersPM', label: 'Wipe counters + stovetop' },
    { id: 'tidy', label: 'Tidy sweep of tonight\u2019s living space' },
    { id: 'laundry', label: 'One laundry action: start, switch, or fold' }
  ];

  function todayStr(d) {
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function weekKey(d) {
    // Weeks run Sunday through Saturday. Find the most recent Sunday on or
    // before `d` and use that date as the key, so the reset always lands on
    // Sunday — the old formula's boundary silently depended on what weekday
    // January 1st fell on each year, which is why it drifted onto Saturday.
    const daysSinceSunday = d.getDay(); // 0 = Sun ... 6 = Sat
    const anchor = new Date(d.getFullYear(), d.getMonth(), d.getDate() - daysSinceSunday);
    return anchor.getFullYear() + '-' + String(anchor.getMonth() + 1).padStart(2, '0') + '-' + String(anchor.getDate()).padStart(2, '0');
  }
  // These recompute from the real current time on every call, rather than
  // being frozen at page-load — otherwise a tab left open across midnight
  // (or into a new week) would keep thinking it's still the old day/week
  // and could push stale, un-reset data back to Firestore.
  function currentToday() { return todayStr(new Date()); }
  function currentWeekKey() { return weekKey(new Date()); }
  function currentZone() { return ZONES[new Date().getDay()]; }

  const now = new Date();
  const today = todayStr(now);
  const wk = weekKey(now);

  const defaultState = {
    date: today,
    weekKey: wk,
    daily: {},
    zoneDone: false,
    pet: { count: 0 },
    rotisserie: buildFreshRotisserie()
  };

  let state = null;
  let achievementCounts = {};
  let prevLifetimeCount = null;
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading">Getting things ready\u2026</div>';

  // --- Firebase setup ---
  const firebaseConfig = {
    apiKey: "AIzaSyAzJ9EFIGW1l5-IgmrD2MyGTe8_WIcL3hs",
    authDomain: "tendingtoday-f30e4.firebaseapp.com",
    projectId: "tendingtoday-f30e4",
    storageBucket: "tendingtoday-f30e4.firebasestorage.app",
    messagingSenderId: "334824670755",
    appId: "1:334824670755:web:c21c47bc292f8ed711d396",
    measurementId: "G-LJ7XZP3FE1"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();
  const docRef = db.collection('household').doc('tending-today-state');

  function normalizeAndReset(raw) {
    let s = raw ? JSON.parse(JSON.stringify(raw)) : structuredClone(defaultState);
    let changed = false;
    const todayNow = currentToday();
    const wkNow = currentWeekKey();
    if (s.date !== todayNow) { s.date = todayNow; s.daily = {}; s.zoneDone = false; changed = true; }
    if (s.weekKey !== wkNow) {
      s.weekKey = wkNow;
      if (!s.pet) s.pet = { count: 0 };
      s.pet.count = 0;
      if (!s.rotisserie || !Array.isArray(s.rotisserie.active)) {
        s.rotisserie = buildFreshRotisserie();
      } else {
        s.rotisserie = advanceRotisserieWeek(s.rotisserie);
      }
      changed = true;
    }
    if (!s.pet) { s.pet = { count: 0 }; changed = true; }
    if (!s.rotisserie || !Array.isArray(s.rotisserie.active)) { s.rotisserie = buildFreshRotisserie(); changed = true; }
    return { s, changed };
  }

  async function load() {
    try {
      const snap = await docRef.get();
      const { s, changed } = normalizeAndReset(snap.exists ? snap.data() : null);
      state = s;
      if (changed || !snap.exists) {
        await save();
      }
      render();

      // Live sync: reflect changes from other devices instantly
      docRef.onSnapshot((snapshot) => {
        if (!snapshot.exists) return;
        const { s: incoming, changed: needsWrite } = normalizeAndReset(snapshot.data());
        state = incoming;
        render();
        if (needsWrite) save();
      });
    } catch (e) {
      console.error('Firestore load failed', e);
      state = structuredClone(defaultState);
      app.innerHTML = '<div class="loading">Couldn\u2019t connect \u2014 check your connection and reload.</div>';
    }
  }

  async function save() {
    try {
      // Guard against a tab left open across a day/week rollover: re-run the
      // reset check against the current real date right before writing, so
      // a stale tab can never push yesterday's leftover checkmarks over a
      // fresh day that another device (or a reload) already reset.
      const { s: corrected, changed } = normalizeAndReset(state);
      state = corrected;
      await docRef.set(state);
      if (window.trackPageUpdate) window.trackPageUpdate('tending-today');
      if (changed) render();
    } catch (e) {
      console.error('Firestore save failed', e);
    }
  }

  function plantSVG(fraction) {
    // fraction 0..1 grows leaves
    const leaves = [
      { d: 'M28 44 C 20 40, 16 30, 22 22', op: Math.min(1, fraction / 0.2) },
      { d: 'M28 44 C 36 40, 40 30, 34 22', op: Math.min(1, Math.max(0,(fraction-0.15)) / 0.2) },
      { d: 'M28 40 C 24 32, 24 20, 30 12', op: Math.min(1, Math.max(0,(fraction-0.35)) / 0.25) },
      { d: 'M28 40 C 32 32, 32 18, 26 10', op: Math.min(1, Math.max(0,(fraction-0.55)) / 0.25) },
      { d: 'M28 38 C 28 28, 28 16, 28 8', op: Math.min(1, Math.max(0,(fraction-0.8)) / 0.25) }
    ];
    const leafPaths = leaves.map(l =>
      `<path d="${l.d}" stroke="#7C9075" stroke-width="3.5" stroke-linecap="round" fill="none" style="opacity:${l.op}; transition: opacity 0.4s ease;"/>`
    ).join('');
    return `<svg viewBox="0 0 56 56" width="56" height="56">
      ${leafPaths}
      <path d="M14 44 L42 44 L38 54 L18 54 Z" fill="#B4636F" opacity="0.85"/>
      <rect x="12" y="42" width="32" height="4" rx="2" fill="#92464F"/>
    </svg>`;
  }

  function dailyFraction() {
    const done = DAILY_TASKS.filter(t => state.daily[t.id]).length;
    return done / DAILY_TASKS.length;
  }

  function checkIcon() {
    return `<svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 7L5.5 10.5L12 3" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
  }

  function homeIcon() {
    return `<svg width="16" height="16" viewBox="0 0 16 16"><path d="M2 7.5L8 2.5L14 7.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/><path d="M4 6.5V13H12V6.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`;
  }

  function themeIcon() {
    return window.currentTheme === 'dark'
      ? `<svg width="15" height="15" viewBox="0 0 16 16"><circle cx="8" cy="8" r="3.2" fill="currentColor"/><g stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><path d="M8 1.5V3.2"/><path d="M8 12.8V14.5"/><path d="M1.5 8H3.2"/><path d="M12.8 8H14.5"/><path d="M3.4 3.4L4.6 4.6"/><path d="M11.4 11.4L12.6 12.6"/><path d="M12.6 3.4L11.4 4.6"/><path d="M4.6 11.4L3.4 12.6"/></g></svg>`
      : `<svg width="15" height="15" viewBox="0 0 16 16"><path d="M13.5 9.5A6 6 0 1 1 6.5 2.5A5 5 0 0 0 13.5 9.5Z" fill="currentColor"/></svg>`;
  }

  function render() {
    const frac = dailyFraction();
    const nowLive = new Date();
    const dateLabel = nowLive.toLocaleDateString(undefined, { weekday: 'long', month: 'short', day: 'numeric' });
    const zone = currentZone();
    const lifetimeCount = window.sumAchievementCounts
      ? window.sumAchievementCounts(achievementCounts, ['daily:', 'zone:', 'deep:', 'pet:brush'])
      : 0;
    const didIncrease = prevLifetimeCount !== null && lifetimeCount > prevLifetimeCount;
    prevLifetimeCount = lifetimeCount;
    const badgeTier = window.badgeTierForCount ? window.badgeTierForCount(lifetimeCount) : 0;
    const tierClass = badgeTier >= 4 ? 'shimmer-prestige' : badgeTier === 3 ? 'shimmer-t3' : badgeTier === 2 ? 'shimmer-t2' : badgeTier === 1 ? 'shimmer-t1' : '';
    const badgePalette = badgeTier >= 4 && window.badgePaletteForTier ? window.badgePaletteForTier(badgeTier) : null;
    const badgeOpacity = window.badgeShimmerOpacity ? window.badgeShimmerOpacity(badgeTier) : 0;
    const badgeStyleParts = [];
    if (badgeTier >= 1) badgeStyleParts.push(`--badge-opacity:${badgeOpacity}`);
    if (badgePalette) badgeStyleParts.push(`--badge-edge:${badgePalette.edge}`, `--badge-shimmer:${badgePalette.shimmer}`);
    const badgeStyle = badgeStyleParts.length ? ` style="${badgeStyleParts.join('; ')};"` : '';
    const countClasses = ['progress-count', tierClass, didIncrease ? 'count-pop' : ''].filter(Boolean).join(' ');

    let html = '';
    html += `<div class="header">
      <div class="header-icons">
        <a class="home-btn" href="home.html" aria-label="Home">${homeIcon()}</a>
      </div>
      <div class="header-text">
        <h1>Tending Today</h1>
        <div class="date">${dateLabel}</div>
      </div>
      <div class="icon-progress">
        <div class="plant-wrap">${plantSVG(frac)}</div>
        <div class="${countClasses}"${badgeStyle} aria-label="Lifetime tasks completed">${lifetimeCount}</div>
      </div>
    </div>`;

    // Daily foundations
    html += `<div class="section">
      <div class="eyebrow">Daily Foundations</div>
      <h2>Keep the boat afloat</h2>`;
    DAILY_TASKS.forEach(t => {
      const checked = !!state.daily[t.id];
      html += `<div class="task-row ${checked ? 'done' : ''}" data-daily="${t.id}">
        <div class="checkbox ${checked ? 'checked' : ''}">${checkIcon()}</div>
        <div class="task-label">${t.label}</div>
      </div>`;
    });
    html += `</div>`;

    // Zone of the day
    html += `<div class="section zone">
      <div class="eyebrow">${zone.room} \u2014 Zone of the Day</div>
      <h2>${zone.name}</h2>
      <div class="single-task" data-zone="1">
        <div class="checkbox ${state.zoneDone ? 'checked' : ''}">${checkIcon()}</div>
        <div>
          <div class="task-label ${state.zoneDone ? 'done' : ''}" style="${state.zoneDone ? 'text-decoration:line-through; opacity:0.65;' : ''}">${zone.task}</div>
        </div>
      </div>
    </div>`;

    // Rotisserie
    const rotDone = state.rotisserie.active.filter(a => a.done).length;
    html += `<div class="section rotisserie">
      <div class="eyebrow">This Week's Deep Tasks \u00b7 ${rotDone} of 3 done</div>
      <h2>Monthly Rotisserie</h2>`;
    state.rotisserie.active.forEach((a, i) => {
      const label = ROTISSERIE[a.taskIndex] + (a.room ? ` \u2014 ${a.room}` : '');
      html += `<div class="task-row ${a.done ? 'done' : ''}" data-rotisserie="${i}">
        <div class="checkbox ${a.done ? 'checked' : ''}">${checkIcon()}</div>
        <div class="task-label">${label}</div>
      </div>`;
    });
    html += `<div class="sub-label" style="margin-top:8px;">Aim for all 3 to build a consistent deep-clean baseline \u2014 anything left unchecked carries over to next week</div>
    </div>`;

    // Pet upkeep
    html += `<div class="section pet">
      <div class="eyebrow">Pet Upkeep</div>
      <h2>Brush pass this week (aim for 3)</h2>
      <div class="pet-row">
        ${[0,1,2].map(i => `<div class="pet-dot ${state.pet.count > i ? 'done' : ''}" data-pet="${i}">${state.pet.count > i ? '\u2713' : (i+1)}</div>`).join('')}
      </div>
    </div>`;

    html += `<div class="grace">Missing a day isn\u2019t a failure \u2014 there\u2019s no streak to break. The Daily Foundations are the only thing worth protecting; everything else can wait a week.<br><br>Synced live across your household \u2014 anyone with this page open sees updates instantly.</div>`;

    app.innerHTML = html;

    // Bind events

    app.querySelectorAll('[data-daily]').forEach(el => {
      el.addEventListener('click', async () => {
        const id = el.getAttribute('data-daily');
        state.daily[id] = !state.daily[id];
        if (window.recordAchievement) recordAchievement('daily:' + id, state.daily[id] ? 1 : -1);
        if (state.daily[id] && DAILY_TASKS.every(t => state.daily[t.id]) && window.recordPerfectDay) {
          recordPerfectDay(currentToday());
        }
        await save();
        render();
      });
    });
    const zoneEl = app.querySelector('[data-zone]');
    if (zoneEl) zoneEl.addEventListener('click', async () => {
      state.zoneDone = !state.zoneDone;
      if (window.recordAchievement) recordAchievement('zone:' + currentZone().name, state.zoneDone ? 1 : -1);
      await save();
      render();
    });
    app.querySelectorAll('[data-rotisserie]').forEach(el => {
      el.addEventListener('click', async () => {
        const idx = parseInt(el.getAttribute('data-rotisserie'), 10);
        const entry = state.rotisserie.active[idx];
        if (entry) {
          entry.done = !entry.done;
          if (window.recordAchievement) recordAchievement('deep:' + ROTISSERIE[entry.taskIndex], entry.done ? 1 : -1);
        }
        await save();
        render();
      });
    });
    app.querySelectorAll('[data-pet]').forEach(el => {
      el.addEventListener('click', async () => {
        const i = parseInt(el.getAttribute('data-pet'), 10);
        const oldCount = state.pet.count;
        state.pet.count = (state.pet.count === i + 1) ? i : i + 1;
        if (window.recordAchievement && state.pet.count !== oldCount) {
          recordAchievement('pet:brush', state.pet.count - oldCount);
        }
        await save();
        render();
      });
    });
  }

  requireHouseholdAuth(function() {
    trackPageVisit('tending-today');
    initTheme();
    initPriorityAlertBanner();
    initMascotWidget();
    if (window.subscribeAchievementCounts) {
      window.subscribeAchievementCounts(function (counts) {
        achievementCounts = counts;
        if (state) render();
      });
    }
    load();

    // Belt-and-suspenders: if this tab is left open across a day or week
    // rollover, catch it on a timer too, not just on the next click/save.
    setInterval(() => {
      if (!state) return;
      const { s: corrected, changed } = normalizeAndReset(state);
      if (changed) {
        state = corrected;
        render();
        save();
      }
    }, 5 * 60 * 1000);
  });
})();
</script>

</body>
</html>
